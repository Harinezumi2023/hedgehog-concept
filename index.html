<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEDGEHOG CONCEPT株式会社</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-gray: #f2f2f2;
    --bg-white: #ffffff;
    --text-dark: #333333;
    --text-mid: #666666;
    --text-light: #999999;
    --green: #3a8a4a;
    --black-btn: #333333;
    --border: #e0e0e0;
    --font: 'Noto Sans JP', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-gray);
    color: var(--text-dark);
    font-family: var(--font);
    font-weight: 300;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: var(--bg-gray);
  }

  .nav-logo {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-decoration: none;
    color: var(--text-dark);
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    font-size: 14px;
    font-weight: 300;
    text-decoration: none;
    color: var(--text-dark);
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--green); }
  .nav-links a.active { color: var(--green); }

  .nav-contact {
    background: var(--black-btn) !important;
    color: #fff !important;
    padding: 10px 24px !important;
    border-radius: 999px;
  }

  #hero {
    min-height: 100vh;
    background: var(--bg-gray);
    display: flex;
    align-items: center;
    padding: 100px 80px 80px;
    position: relative;
    gap: 40px;
  }

  .hero-left { flex: 1; max-width: 520px; }

  .hero-headline {
    font-size: clamp(26px, 3vw, 40px);
    font-weight: 300;
    line-height: 1.9;
    letter-spacing: 0.1em;
    color: var(--text-dark);
    margin-bottom: 32px;
  }

  .hero-sub {
    font-size: 14px;
    line-height: 2;
    color: var(--text-mid);
  }

  .hero-right {
    flex: 1;
    display: flex;
    justify-content: flex-end;
  }

  .hero-visual {
    width: 440px;
    height: 440px;
    position: relative;
  }

  .vis-circle {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    border-radius: 50%;
    background: #d4d4d4;
  }

  .vis-rect {
    position: absolute;
    bottom: 30px; right: 0;
    width: 240px; height: 240px;
    background: #c4c4c4;
  }

  .vis-tri {
    position: absolute;
    bottom: 30px; left: 60px;
    width: 0; height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-bottom: 140px solid #b8b8b8;
  }

  .hero-scroll {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 12px;
    color: var(--text-mid);
    letter-spacing: 0.1em;
  }

  .hero-scroll::after { content: '↓'; display: block; margin-top: 6px; }

  .section-title { text-align: center; padding: 80px 40px 60px; }

  .section-title h2 {
    font-size: clamp(56px, 8vw, 96px);
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 12px;
    color: var(--text-dark);
  }

  .section-title p { font-size: 13px; color: var(--text-mid); letter-spacing: 0.05em; }

  #about { background: var(--bg-white); }

  .about-inner {
    display: flex;
    gap: 80px;
    padding: 0 80px 100px;
    max-width: 1200px;
    margin: 0 auto;
    align-items: flex-start;
  }

  .about-img { flex: 1; max-width: 460px; }

  .about-img-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: #e4e4e4;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-light);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  .about-text { flex: 1; }

  .about-text p {
    font-size: 18px;
    font-weight: 300;
    line-height: 2;
    color: var(--text-dark);
  }

  .about-text p + p { margin-top: 28px; }

  .about-questions {
    margin: 32px 0;
    font-size: 20px !important;
    font-weight: 400 !important;
    line-height: 2.2 !important;
    color: var(--text-dark) !important;
    letter-spacing: 0.04em;
  }

  .about-sign { margin-top: 48px; font-size: 13px; color: var(--text-mid); }

  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--text-dark);
    padding: 12px 28px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-dark);
    text-decoration: none;
    margin-top: 40px;
    transition: background 0.2s, color 0.2s;
    font-family: var(--font);
    background: transparent;
    cursor: pointer;
  }

  .btn-outline:hover { background: var(--text-dark); color: #fff; }

  #business { background: var(--bg-gray); }

  .business-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 0 40px 100px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .biz-card { background: var(--bg-white); border-radius: 4px; overflow: hidden; }

  .biz-card-img {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.7);
  }

  .img-01 { background: #d0d0d0; }
  .img-02 { background: #c4c8c4; }
  .img-03 { background: #ccc8c4; }
  .img-04 { background: #c8c8cc; }

  .biz-card-coming {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-light
